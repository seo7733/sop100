<head>

<style>

.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:linear-gradient(135deg,var(--navy-900),var(--navy-700));display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}.header-left{display:flex;align-items:center;gap:12px}.logo-icon{width:34px;height:34px;background:var(--fire-600);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff}.logo-text h1{font-size:14px;font-weight:700;color:#fff}.logo-text span{font-size:10px;color:var(--slate-200);opacity:.7}.header-right{display:flex;align-items:center;gap:8px}.btn-h{padding:6px 12px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.2s;text-decoration:none;display:flex;align-items:center;gap:5px}.btn-h:hover{background:rgba(255,255,255,.1)}.user-avatar{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);object-fit:cover}
.search-hero{margin-top:var(--header-h);padding:18px 20px 14px;background:linear-gradient(135deg,var(--navy-800),var(--navy-600));text-align:center}.search-hero h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}.search-container{max-width:640px;margin:0 auto;position:relative}.search-input{width:100%;padding:10px 14px 10px 38px;border:2px solid transparent;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.12);outline:none}.search-input:focus{border-color:var(--fire-500)}.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--navy-300)}.search-filter-row{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}.filter-chip{padding:4px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}.filter-chip.active{background:var(--fire-600);border-color:var(--fire-600);color:#fff}

.board-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap}.board-header h3{font-size:18px;font-weight:700}.board-tools{display:flex;align-items:center;gap:8px}.ppg-select{padding:6px 10px;border:1px solid var(--slate-200);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:var(--navy-400);cursor:pointer;outline:none}.btn-write{padding:8px 16px;border:none;border-radius:10px;background:var(--fire-600);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}.btn-write:hover{background:var(--fire-700)}

.write-modal,.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:20px}.write-modal.show,.edit-modal.show{display:flex}.write-card{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px}.write-card h2{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}.write-card h2 button{background:none;border:none;font-size:22px;color:var(--navy-300);cursor:pointer}.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:700;color:var(--navy-400);margin-bottom:5px}.fg select,.fg input,.fg textarea{width:100%;padding:10px 14px;border:2px solid var(--slate-200);border-radius:10px;font-size:13px;font-family:inherit;outline:none}.fg textarea{min-height:180px;resize:vertical;line-height:1.7}.file-upload{padding:20px;border:2px dashed var(--slate-200);border-radius:10px;text-align:center;color:var(--navy-300);font-size:12px;cursor:pointer}.file-upload:hover{border-color:var(--fire-400);color:var(--fire-500)}.file-upload.dragover{border-color:var(--fire-500);background:rgba(239,68,68,.06);color:var(--fire-600)}.file-upload i{font-size:22px;display:block;margin-bottom:6px}.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}.btn-cancel{padding:10px 20px;border:1px solid var(--slate-200);border-radius:10px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--navy-400)}.btn-submit{padding:10px 20px;border:none;border-radius:10px;background:var(--fire-600);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}.btn-submit:disabled{opacity:.5}
.pd-body img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:16px}.pg-btn{width:32px;height:32px;border:1px solid var(--slate-200);border-radius:8px;background:#fff;font-size:12px;font-weight:600;color:var(--navy-400);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}.pg-btn:hover{background:var(--slate-50)}.pg-btn.active{background:var(--navy-800);color:#fff;border-color:var(--navy-800)}.pg-info{font-size:11px;color:var(--navy-300);margin:0 8px}
.empty-state{padding:50px 20px;text-align:center}.empty-state i{font-size:40px;color:var(--slate-200);margin-bottom:12px}.empty-state h4{font-size:16px;font-weight:700;color:var(--navy-400);margin-bottom:6px}.empty-state p{font-size:13px;color:var(--navy-300)}
.admin-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff;margin-left:6px}.admin-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px dashed var(--slate-200)}.admin-bar .pd-btn{border-color:var(--amber-500);color:#b45309}.admin-bar .pd-btn.danger{border-color:var(--fire-400);color:var(--fire-600)}
.toast{position:fixed;top:70px;right:16px;padding:12px 18px;border-radius:10px;background:var(--navy-800);color:#fff;font-size:12px;font-weight:600;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.2);transform:translateX(120%);transition:.3s;display:flex;align-items:center;gap:6px}.toast.show{transform:translateX(0)}.toast.success{background:var(--emerald-600)}.toast.error{background:var(--fire-600)}
.login-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}.login-modal.show{display:flex}.login-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:380px;text-align:center}.login-card h2{font-size:20px;font-weight:700;margin-bottom:6px}.login-card p{font-size:13px;color:var(--navy-300);margin-bottom:20px}.btn-google{width:100%;padding:12px;border:2px solid var(--slate-200);border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}.btn-google:hover{border-color:var(--navy-300)}.btn-google img{width:18px;height:18px}
.site-footer{position:fixed;bottom:0;left:0;right:0;height:28px;background:linear-gradient(135deg,#0c1222,#1a2332);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}.site-footer span{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.2px}.site-footer .footer-left{font-style:italic}
@media(max-width:768px){.main-content{padding:14px 14px 48px}.search-hero{padding:12px 14px 10px}.search-hero h2{font-size:15px}.board-tab{padding:7px 6px;font-size:11px}.post-item{padding:10px 14px;gap:8px}.post-stats{display:none}.pd-card{padding:18px}.write-card{padding:18px;max-height:85vh}.header-right .btn-h span{display:none}}
</style>

<body>
<header class="header"><div class="header-left"><div class="logo-icon"><i class="fas fa-fire-flame-curved"></i></div><div class="logo-text"><h1>지휘통제절차(SOP100)의 이해</h1><span>커뮤니티(게시판, 통합검색)</span></div></div><div class="header-right"><a href="./admin.html" class="btn-h" id="adminBtn" style="display:none;background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4)"><i class="fas fa-shield-alt"></i> <span>관리</span></a><a href="./index.html" class="btn-h"><i class="fas fa-book-open"></i> <span>교안</span></a><button class="btn-h" id="btnUser" onclick="toggleLogin()"><i class="fas fa-user"></i> <span id="uName">로그인</span></button></div></header>
<section class="search-hero"><h2><i class="fas fa-search" style="margin-right:6px;opacity:.5"></i>통합 검색</h2><div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" id="sI" placeholder="SOP 번호, 용어, 게시판 글 검색…" autocomplete="off"><div class="search-results" id="sR"></div></div><div class="search-filter-row"><button class="filter-chip active" data-filter="all">전체</button><button class="filter-chip" data-filter="sop">SOP</button><button class="filter-chip" data-filter="slide">슬라이드</button><button class="filter-chip" data-filter="term">용어</button><button class="filter-chip" data-filter="board">게시판</button></div></section>
<main class="main-content">
<div class="board-tabs"><button class="board-tab active" data-board="all"><i class="fas fa-th-large"></i> 전체 <span class="tab-count" id="cAll">0</span></button><button class="board-tab" data-board="notice"><i class="fas fa-bullhorn"></i> 공지 <span class="tab-count" id="cNot">0</span></button><button class="board-tab" data-board="qa"><i class="fas fa-comments"></i> Q&A <span class="tab-count" id="cQa">0</span></button><button class="board-tab" data-board="sop"><i class="fas fa-clipboard-list"></i> SOP <span class="tab-count" id="cSop">0</span></button><button class="board-tab" data-board="resource"><i class="fas fa-folder-open"></i> 자료 <span class="tab-count" id="cRes">0</span></button><button class="board-tab" data-board="review"><i class="fas fa-star"></i> 후기 <span class="tab-count" id="cRev">0</span></button></div>
<div id="listV"><div class="board-header"><h3 id="bTitle">전체 게시글</h3><div class="board-tools"><select class="ppg-select" id="ppgSel" onchange="PPG=this.value==='all'?9999:parseInt(this.value);curP=1;renP()"><option value="10">10개씩</option><option value="20">20개씩</option><option value="30">30개씩</option><option value="all">전체</option></select><button class="btn-write" onclick="openWrite()"><i class="fas fa-pen"></i> 글쓰기</button></div></div><div class="post-list" id="pList"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><h4>불러오는 중…</h4></div></div><div class="pagination" id="pgn"></div></div>
<div class="post-detail" id="detailV"><button class="pd-back" onclick="closeDet()"><i class="fas fa-arrow-left"></i> 목록으로</button><div class="pd-card" id="detCard"></div><div class="cmt-card"><h3><i class="fas fa-comments"></i> 댓글 <span id="cmtCnt">0</span></h3><div class="cmt-write"><textarea id="cmtIn" placeholder="댓글을 입력하세요…" rows="2"></textarea><button onclick="addCmt()">등록</button></div><div id="cmtList"></div></div></div>
</main>
<div class="write-modal" id="wModal"><div class="write-card"><h2>새 글 작성 <button onclick="closeWrite()">&times;</button></h2><div class="fg"><label>분류</label><select id="wCat"><option value="notice">공지사항</option><option value="qa" selected>Q&A</option><option value="sop">SOP</option><option value="resource">자료실</option><option value="review">후기·토론</option></select></div><div class="fg"><label>제목</label><input id="wTitle" placeholder="제목"></div><div class="fg"><label>내용</label><textarea id="wBody" placeholder="내용을 입력하세요…"></textarea></div>
<div class="fg" id="writeFileArea" style="display:none"><label>첨부파일</label><div class="file-upload" id="fuArea"><i class="fas fa-cloud-upload-alt"></i>클릭 또는 파일을 끌어놓기 (최대 50MB)<input type="file" id="fIn" multiple style="display:none"></div><div id="fPrev" style="margin-top:6px"></div></div><div class="form-actions"><button class="btn-cancel" onclick="closeWrite()">취소</button><button class="btn-submit" id="subBtn" onclick="submitPost()">게시하기</button></div></div></div>
<div class="edit-modal" id="eModal"><div class="write-card"><h2>글 수정 <button onclick="closeEdit()">&times;</button></h2><div class="fg"><label>분류</label><select id="eCat"><option value="notice">공지사항</option><option value="qa">Q&A</option><option value="sop">SOP</option><option value="resource">자료실</option><option value="review">후기·토론</option></select></div><div class="fg"><label>제목</label><input id="eTitle"></div><div class="fg"><label>내용</label><textarea id="eBody"></textarea></div>

function setupDragDrop(areaId,inputId,prevId,isNew){
var area=document.getElementById(areaId),inp=document.getElementById(inputId);
['dragenter','dragover'].forEach(function(e){area.addEventListener(e,function(ev){ev.preventDefault();area.classList.add('dragover')})});
['dragleave','drop'].forEach(function(e){area.addEventListener(e,function(ev){ev.preventDefault();area.classList.remove('dragover')})});
area.addEventListener('drop',function(ev){var dt=ev.dataTransfer;if(!dt||!dt.files.length)return;var tr=new DataTransfer();if(inp.files)for(var i=0;i<inp.files.length;i++)tr.items.add(inp.files[i]);for(var j=0;j<dt.files.length;j++)tr.items.add(dt.files[j]);inp.files=tr.files;renderFP(inp.files,prevId,isNew)})}
function renderFP(files,prevId,isNew){var pv=document.getElementById(prevId);pv.innerHTML='';for(var i=0;i<files.length;i++){var f=files[i];var bg=isNew?'#e0f2fe':'#f1f5f9';var ic=isNew?'fa-plus-circle':'fa-file';var cl=isNew?'var(--blue-600)':'#ef4444';pv.innerHTML+='<div style="padding:5px 10px;background:'+bg+';border-radius:7px;margin-bottom:3px;font-size:12px;display:flex;align-items:center;gap:6px"><i class="fas '+ic+'" style="color:'+cl+'"></i>'+esc(f.name)+'<span style="color:#999;margin-left:auto">'+(f.size/1048576).toFixed(1)+'MB'+(isNew?' 새파일':'')+'</span></div>'}}

  editFiles=origF;
}
await sb.from('posts').update({category:cat,title:title,content:body,files:editFiles}).eq('id',id);
btn.disabled=false;btn.textContent='저장하기';closeEdit();closeDet();tst('수정 완료','success');
}else{var p=posts.find(function(x){return x.id===id});if(p){p.category=cat;p.title=title;p.content=body;p.files=editFiles}btn.disabled=false;btn.textContent='저장하기';closeEdit();closeDet();updC();renP();tst('수정 완료','success')}}

// === COMMENTS ===
function loadCmt(id){var el=document.getElementById('cmtList'),cn=document.getElementById('cmtCnt');
if(!ok||!sb||String(id).startsWith('d')){var dc={d1:[{author:'박소방',text:'좋은 플랫폼!',created_at:'2026-03-20T12:00:00'}]};var cm=dc[id]||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:16px;color:#999;font-size:12px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h;return}
sb.from('comments').select('*').eq('post_id',id).order('created_at').then(function(r){var cm=r.data||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:16px;color:#999;font-size:12px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h})}
function addCmt(){if(!me){tst('로그인 필요','error');return}var t=document.getElementById('cmtIn').value.trim();if(!t){tst('댓글 입력','error');return}
if(ok&&sb&&!String(curId).startsWith('d')){sb.from('comments').insert({post_id:curId,author:me.name,text:t}).then(function(r){if(r.error){tst('실패','error');return}
  sb.from('posts').select('comment_count').eq('id',curId).single().then(function(cr){var cur=(cr.data&&cr.data.comment_count)||0;sb.from('posts').update({comment_count:cur+1}).eq('id',curId)});
  document.getElementById('cmtIn').value='';tst('댓글 등록','success');loadCmt(curId)})}else tst('데모 모드','error')}

// === WRITE ===
function openWrite(){
  if(!me){tst('로그인 필요','error');return}
  document.getElementById('eModal').classList.remove('show');
  var fa=document.getElementById('writeFileArea');if(fa)fa.style.display=isAdmin()?'block':'none';
  document.getElementById('wModal').classList.add('show');
}
function closeWrite(){document.getElementById('wModal').classList.remove('show');document.getElementById('wTitle').value='';document.getElementById('wBody').value='';document.getElementById('fPrev').innerHTML='';document.getElementById('fIn').value='';var b=document.getElementById('subBtn');b.disabled=false;b.textContent='게시하기'}


async function submitPost(){var cat=document.getElementById('wCat').value,title=document.getElementById('wTitle').value.trim(),body=document.getElementById('wBody').value.trim();if(!title){tst('제목 입력','error');return}if(!body){tst('내용을 입력하세요','error');return}
var btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='업로드…';
var fi=[];
if(ok&&sb){
  var files=document.getElementById('fIn').files;
  for(var i=0;i<files.length;i++){
    var f=files[i],ext=f.name.split('.').pop().toLowerCase(),fp='board/'+Date.now()+'_'+Math.random().toString(36).substring(2,8)+'.'+ext;
    btn.textContent='파일 업로드 중 ('+(i+1)+'/'+files.length+')…';
    var ur=await sb.storage.from('sop100-board-files').upload(fp,f,{cacheControl:'3600',upsert:false});
    if(ur.error){console.error('Storage upload error:',ur.error);tst('파일 업로드 실패: '+ur.error.message,'error');btn.disabled=false;btn.textContent='게시하기';return}
    var pu=sb.storage.from('sop100-board-files').getPublicUrl(fp);
    fi.push({name:f.name,url:pu.data.publicUrl,size:(f.size/1048576).toFixed(1)+'MB',path:fp});
  }
  btn.textContent='게시글 등록 중…';
  var pd={category:cat,title:title,content:body,author:me.name,author_email:me.email,views:0,likes:0,comment_count:0,pinned:false,files:fi};
  var r=await sb.from('posts').insert(pd);
  if(r.error){console.error('Post insert error:',r.error);tst('실패: '+r.error.message,'error');btn.disabled=false;btn.textContent='게시하기';return}
  closeWrite();tst('등록 완료!'+(fi.length?' (파일 '+fi.length+'개)':''),'success');updC();
}else{var pd={id:'l'+Date.now(),created_at:new Date().toISOString(),category:cat,title:title,content:body,author:me.name,author_email:me.email||'',views:0,likes:0,comment_count:0,pinned:false,files:fi};posts.unshift(pd);updC();renP();closeWrite();tst('등록(로컬)','success')}}


</script>
