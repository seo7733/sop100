function closeEdit(){document.getElementById('eModal').classList.remove('show')}
function saveEdit(){var id=document.getElementById('eModal').getAttribute('data-id');var cat=document.getElementById('eCat').value,title=document.getElementById('eTitle').value.trim(),body=document.getElementById('eBody').value.trim();if(!title||!body){tst('제목/내용 필수','error');return}if(ok&&sb&&!String(id).startsWith('d')){sb.from('posts').update({category:cat,title:title,content:body}).eq('id',id).then(function(r){if(r.error){tst('실패: '+r.error.message,'error');return}closeEdit();closeDet();tst('수정 완료','success');loadP()})}else{var p=posts.find(function(x){return x.id===id});if(p){p.category=cat;p.title=title;p.content=body}closeEdit();closeDet();updC();renP();tst('수정 완료','success')}}

function loadCmt(id){var el=document.getElementById('cmtList'),cn=document.getElementById('cmtCnt');
if(!ok||!sb||String(id).startsWith('d')){var dc={d1:[{author:'강서 박소방',text:'좋은 플랫폼!',created_at:'2026-03-20T12:00:00'}],d3:[{author:'윤교관',text:'대기1단계는 원칙적 적용이나, 출동대 1~2개인 소규모는 생략 가능합니다.',created_at:'2026-03-19T10:00:00'}]};var cm=dc[id]||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:20px;color:#999;font-size:13px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h;return}
sb.from('comments').select('*').eq('post_id',id).order('created_at').then(function(r){var cm=r.data||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:20px;color:#999;font-size:13px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h})}
function addCmt(){if(!me){tst('로그인 필요','error');return}var t=document.getElementById('cmtIn').value.trim();if(!t){tst('댓글 입력','error');return}
if(ok&&sb&&!String(curId).startsWith('d')){sb.from('comments').insert({post_id:curId,author:me.name,text:t}).then(function(r){if(r.error){tst('실패','error');return}sb.rpc('increment_comment_count',{post_id:curId});document.getElementById('cmtIn').value='';tst('댓글 등록','success');loadCmt(curId)})}else tst('데모 모드','error')}

function openWrite(){if(!me){tst('로그인 필요','error');return}document.getElementById('wModal').classList.add('show')}
function closeWrite(){document.getElementById('wModal').classList.remove('show');document.getElementById('wTitle').value='';document.getElementById('wBody').value='';document.getElementById('fPrev').innerHTML='';var b=document.getElementById('subBtn');b.disabled=false;b.textContent='게시하기'}
document.getElementById('fuArea').addEventListener('click',function(){document.getElementById('fIn').click()});
document.getElementById('fIn').addEventListener('change',function(){var pv=document.getElementById('fPrev');pv.innerHTML='';for(var i=0;i<this.files.length;i++){var f=this.files[i];pv.innerHTML+='<div style="padding:6px 12px;background:#f1f5f9;border-radius:8px;margin-bottom:4px;font-size:13px;display:flex;align-items:center;gap:8px"><i class="fas fa-file" style="color:#ef4444"></i>'+esc(f.name)+'<span style="color:#999;margin-left:auto">'+(f.size/1048576).toFixed(1)+'MB</span></div>'}});
async function submitPost(){var cat=document.getElementById('wCat').value,title=document.getElementById('wTitle').value.trim(),body=document.getElementById('wBody').value.trim();if(!title){tst('제목 입력','error');return}if(!body){tst('내용 입력','error');return}
var btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='업로드…';
var pd={category:cat,title:title,content:body,author:me.name,author_email:me.email,views:0,likes:0,comment_count:0,pinned:false,files:[]};
if(ok&&sb){var files=document.getElementById('fIn').files,fi=[];for(var i=0;i<files.length;i++){var f=files[i],fp='board/'+Date.now()+'_'+f.name;var ur=await sb.storage.from('board-files').upload(fp,f);if(!ur.error){var pu=sb.storage.from('board-files').getPublicUrl(fp);fi.push({name:f.name,url:pu.data.publicUrl,size:(f.size/1048576).toFixed(1)+'MB'})}}
if(fi.length)pd.files=fi;var r=await sb.from('posts').insert(pd);if(r.error){tst('실패: '+r.error.message,'error');btn.disabled=false;btn.textContent='게시하기';return}closeWrite();tst('등록 완료!','success');loadP()}else{pd.id='l'+Date.now();pd.created_at=new Date().toISOString();posts.unshift(pd);updC();renP();closeWrite();tst('등록(로컬)','success')}}
</script>
</body>
</html>
