<style>

<body>
<header class="header"><div class="header-left"><div class="logo-icon"><i class="fas fa-fire-flame-curved"></i></div><div class="logo-text"><h1>지휘통제절차(SOP100)의 이해</h1><span>커뮤니티(게시판, 통합검색)</span></div></div><div class="header-right"><a href="./admin.html" class="btn-h" id="adminBtn" style="display:none;background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4)"><i class="fas fa-shield-alt"></i> <span>관리</span></a><a href="./index.html" class="btn-h"><i class="fas fa-book-open"></i> <span>교안</span></a><button class="btn-h" id="btnUser" onclick="toggleLogin()"><i class="fas fa-user"></i> <span id="uName">로그인</span></button></div></header>
<section class="search-hero"><h2><i class="fas fa-search" style="margin-right:6px;opacity:.5"></i>통합 검색</h2><div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" id="sI" placeholder="SOP 번호, 용어, 게시판 글 검색…" autocomplete="off"><div class="search-results" id="sR"></div></div><div class="search-filter-row"><button class="filter-chip active" data-filter="all">전체</button><button class="filter-chip" data-filter="sop">SOP</button><button class="filter-chip" data-filter="slide">슬라이드</button><button class="filter-chip" data-filter="term">용어</button><button class="filter-chip" data-filter="board">게시판</button></div></section>
<main class="main-content">
<div class="board-tabs"><button class="board-tab active" data-board="all"><i class="fas fa-th-large"></i> 전체 <span class="tab-count" id="cAll">0</span></button><button class="board-tab" data-board="notice"><i class="fas fa-bullhorn"></i> 공지 <span class="tab-count" id="cNot">0</span></button><button class="board-tab" data-board="qa"><i class="fas fa-comments"></i> Q&A <span class="tab-count" id="cQa">0</span></button><button class="board-tab" data-board="sop"><i class="fas fa-clipboard-list"></i> SOP <span class="tab-count" id="cSop">0</span></button><button class="board-tab" data-board="resource"><i class="fas fa-folder-open"></i> 자료 <span class="tab-count" id="cRes">0</span></button><button class="board-tab" data-board="review"><i class="fas fa-star"></i> 후기 <span class="tab-count" id="cRev">0</span></button></div>
<div id="listV"><div class="board-header"><h3 id="bTitle">전체 게시글</h3><div class="board-tools"><select class="ppg-select" id="ppgSel" onchange="PPG=this.value==='all'?9999:parseInt(this.value);curP=1;renP()"><option value="10">10개씩</option><option value="20">20개씩</option><option value="30">30개씩</option><option value="all">전체</option></select><button class="btn-write" onclick="openWrite()"><i class="fas fa-pen"></i> 글쓰기</button></div></div><div class="post-list" id="pList"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><h4>불러오는 중…</h4></div></div><div class="pagination" id="pgn"></div></div>
<div class="post-detail" id="detailV"><button class="pd-back" onclick="closeDet()"><i class="fas fa-arrow-left"></i> 목록으로</button><div class="pd-card" id="detCard"></div><div class="cmt-card"><h3><i class="fas fa-comments"></i> 댓글 <span id="cmtCnt">0</span></h3><div class="cmt-write"><textarea id="cmtIn" placeholder="댓글을 입력하세요…" rows="2"></textarea><button onclick="addCmt()">등록</button></div><div id="cmtList"></div></div></div>
</main>
<div class="write-modal" id="wModal"><div class="write-card"><h2>새 글 작성 <button onclick="closeWrite()">&times;</button></h2><div class="fg"><label>분류</label><select id="wCat"><option value="notice">공지사항</option><option value="qa" selected>Q&A</option><option value="sop">SOP</option><option value="resource">자료실</option><option value="review">후기·토론</option></select></div><div class="fg"><label>제목</label><input id="wTitle" placeholder="제목"></div><div class="fg"><label>내용</label>
<div class="editor-wrap">
  <div class="editor-toolbar">
    <button class="tb-btn" onclick="fmt('bold')" title="굵게"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')" title="기울임"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')" title="밑줄"><u>U</u></button>
    <button class="tb-btn" onclick="fmt('strikeThrough')" title="취소선"><s>S</s></button>
    <div class="tb-sep"></div>

if(!pg.length){el.innerHTML='<div class="empty-state"><i class="fas fa-inbox"></i><h4>게시글이 없습니다</h4></div>';document.getElementById('pgn').innerHTML='';return}
var h='';pg.forEach(function(p){var files=getFiles(p);h+='<div class="post-item'+(p.pinned?' pinned':'')+'" onclick="openDet(\''+p.id+'\')">';if(p.pinned)h+='<span class="post-pin"><i class="fas fa-thumbtack"></i></span>';h+='<span class="post-category '+cC(p.category)+'">'+cL(p.category)+'</span><div class="post-info"><div class="post-title">'+esc(p.title)+(p.comment_count?'<span class="cc">['+p.comment_count+']</span>':'')+(files.length?' <i class="fas fa-paperclip" style="font-size:11px;color:var(--navy-300)"></i>':'')+'</div><div class="post-meta"><span><i class="fas fa-user"></i> '+esc(p.author||'')+'</span><span><i class="fas fa-clock"></i> '+ago(p.created_at)+'</span></div></div><div class="post-stats"><span class="stat-item"><i class="fas fa-eye"></i> '+(p.views||0)+'</span><span class="stat-item"><i class="fas fa-heart"></i> '+(p.likes||0)+'</span></div></div>'});el.innerHTML=h;
var ph='';if(tp>1){if(curP>1)ph+='<button class="pg-btn" onclick="goP('+(curP-1)+')"><i class="fas fa-chevron-left"></i></button>';var st=Math.max(1,curP-2),en=Math.min(tp,curP+2);for(var i=st;i<=en;i++)ph+='<button class="pg-btn'+(i===curP?' active':'')+'" onclick="goP('+i+')">'+i+'</button>';if(curP<tp)ph+='<button class="pg-btn" onclick="goP('+(curP+1)+')"><i class="fas fa-chevron-right"></i></button>';ph+='<span class="pg-info">'+curP+'/'+tp+' ('+total+'건)</span>'}document.getElementById('pgn').innerHTML=ph}
function goP(n){curP=n;renP();window.scrollTo(0,0)}

// === DETAIL ===
function openDet(id){var p=posts.find(function(x){return x.id===id});if(!p)return;curId=id;
if(ok&&sb&&!String(id).startsWith('d')){
  sb.from('posts').select('views').eq('id',id).single().then(function(r){
    var cur=(r.data&&r.data.views)||0;
    sb.from('posts').update({views:cur+1}).eq('id',id).then(function(ur){
      if(ur.error){console.warn('views update:',ur.error.message)}
      else{var lp=posts.find(function(x){return x.id===id});if(lp)lp.views=cur+1;}
    });
  });
}
var el=document.getElementById('detCard'),files=getFiles(p);
var h='<span class="post-category '+cC(p.category)+'">'+cL(p.category)+'</span><h2>'+esc(p.title)+'</h2><div class="post-meta"><span><i class="fas fa-user"></i> '+esc(p.author||'')+'</span><span><i class="fas fa-clock"></i> '+ago(p.created_at)+'</span><span><i class="fas fa-eye"></i> '+((p.views||0)+1)+'</span><span><i class="fas fa-heart"></i> '+(p.likes||0)+'</span></div><div class="pd-body">'+(p.content||'')+'</div>';
if(files.length){h+='<div class="pd-file-list"><h4><i class="fas fa-paperclip"></i> 첨부파일 ('+files.length+')</h4>';files.forEach(function(f){h+='<div class="pd-file-item"'+(f.url?' onclick="window.open(\''+f.url+'\')"':'')+'><i class="fas '+fileIcon(f.name)+'"></i> '+esc(f.name)+'<span style="margin-left:auto;font-size:10px;color:#999">'+(f.size||'')+'</span></div>'});h+='</div>'}
h+='<div class="pd-actions"><button class="pd-btn" onclick="likeP(curId)"><i class="fas fa-heart"></i> 좋아요</button><button class="pd-btn" onclick="navigator.clipboard.writeText(location.href);tst(\'링크 복사\',\'success\')"><i class="fas fa-link"></i> 복사</button>';
if(me&&me.email&&(p.author_email===me.email||isAdmin())){h+='<button class="pd-btn" onclick="doEdit()" style="margin-left:auto"><i class="fas fa-edit"></i> 수정</button>';h+='<button class="pd-btn" onclick="doDel()" style="color:var(--fire-500)"><i class="fas fa-trash"></i> 삭제</button>';}h+='</div>';
if(isAdmin()){h+='<div class="admin-bar"><span style="font-size:10px;font-weight:700;color:var(--amber-500)"><i class="fas fa-shield-alt"></i> 관리자</span><button class="pd-btn" onclick="doPin('+(p.pinned?'false':'true')+')"><i class="fas fa-thumbtack"></i> '+(p.pinned?'해제':'고정')+'</button></div>'}
el.innerHTML=h;loadCmt(id);document.getElementById('listV').style.display='none';document.getElementById('detailV').classList.add('show');document.getElementById('sR').classList.remove('show');window.scrollTo(0,0)}
function closeDet(){document.getElementById('detailV').classList.remove('show');document.getElementById('listV').style.display='block';curId=null}
function likeP(id){if(ok&&sb&&!String(id).startsWith('d')){
  sb.from('posts').select('likes').eq('id',id).single().then(function(r){
    var cur=(r.data&&r.data.likes)||0;
    sb.from('posts').update({likes:cur+1}).eq('id',id).then(function(ur){
      if(ur.error){console.warn('likes update:',ur.error.message)}
      else{
        var lp=posts.find(function(x){return x.id===id});if(lp)lp.likes=cur+1;
        var det=document.getElementById('detCard');
        if(det){var hrt=det.querySelector('.fa-heart');if(hrt&&hrt.parentElement){hrt.parentElement.textContent='';hrt.parentElement.innerHTML='<i class="fas fa-heart"></i> '+(cur+1);}}
      }
    });
  });
}tst('좋아요!','success')}
async function delP(id){if(!confirm('삭제하시겠습니까? 첨부파일도 함께 삭제됩니다.'))return;
if(ok&&sb&&!String(id).startsWith('d')){var p=posts.find(function(x){return x.id===id});if(p){var fl=getFiles(p);for(var i=0;i<fl.length;i++){var sp=getStoragePath(fl[i].url);if(sp)await sb.storage.from('sop100-board-files').remove([sp])}}await sb.from('posts').delete().eq('id',id);tst('삭제됨','success');closeDet();loadP()
}else{posts=posts.filter(function(x){return x.id!==id});updC();renP();closeDet();tst('삭제됨','success')}}
function togglePin(id,v){if(!isAdmin())return;if(ok&&sb&&!String(id).startsWith('d')){sb.from('posts').update({pinned:v}).eq('id',id).then(function(){tst(v?'고정':'해제','success');loadP();closeDet()})}else{var p=posts.find(function(x){return x.id===id});if(p)p.pinned=v;updC();renP();closeDet()}}

// === EDIT ===
var editFiles=[];
// 상세보기 화면에서 버튼 클릭 시 curId 기반 헬퍼
function doEdit(){
  var id=curId;
  if(!id){console.warn('doEdit: curId 없음');return;}
  var p=posts.find(function(x){return x.id===id});
  if(!p){console.warn('doEdit: post 못찾음',id);return;}
  if(!isAdmin()&&(!me||me.email!==p.author_email)){tst('권한 없음','error');return;}
  // 먼저 wModal 닫기 (혹시 열려있으면)
  document.getElementById('wModal').classList.remove('show');
  // eModal 데이터 채우기
  document.getElementById('eCat').value=p.category;
  document.getElementById('eTitle').value=p.title;
  var eed=document.getElementById('eEditor');
  if(eed)eed.innerHTML=p.content||'';
  editFiles=getFiles(p).slice();
  renderEditFL();
  document.getElementById('eFPrev').innerHTML='';
  document.getElementById('eFIn').value='';
  // 파일첨부 버튼: 관리자만 표시
  var imgBtn=document.getElementById('eImgBtnWrap');
  var fileBtn=document.getElementById('eFileBtnWrap');
  var efa=document.getElementById('editFileArea');
  if(imgBtn)imgBtn.style.display=isAdmin()?'flex':'none';
  if(fileBtn)fileBtn.style.display=isAdmin()?'flex':'none';
  if(efa)efa.style.display=isAdmin()?'block':'none';
  document.getElementById('eModal').dataset.id=id;
  // 약간의 딜레이 후 표시 (렌더링 완료 후)
  setTimeout(function(){
    document.getElementById('eModal').classList.add('show');
  },10);
}
function doDel(){delP(curId);}
function doPin(v){togglePin(curId,v==='true');}

function openEdit(id){doEdit();}
function renderEditFL(){var el=document.getElementById('eFileList');if(!editFiles.length){el.innerHTML='<span style="color:#999">없음</span>';return}
var h='';editFiles.forEach(function(f,i){h+='<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f1f5f9;border-radius:7px;margin-bottom:3px;font-size:12px"><i class="fas '+fileIcon(f.name)+'" style="color:var(--fire-500)"></i>'+esc(f.name)+'<span style="color:#999;font-size:10px;margin-left:4px">'+(f.size||'')+'</span><button onclick="editFiles.splice('+i+',1);renderEditFL()" style="margin-left:auto;background:none;border:none;color:var(--fire-500);cursor:pointer;font-size:13px"><i class="fas fa-times-circle"></i></button></div>'});el.innerHTML=h}
function closeEdit(){document.getElementById('eModal').classList.remove('show');editFiles=[];}
async function saveEdit(){var id=document.getElementById('eModal').dataset.id;var cat=document.getElementById('eCat').value,title=document.getElementById('eTitle').value.trim(),body=(document.getElementById('eEditor').innerHTML||'').trim();
var bodyText=body.replace(/<[^>]+>/g,'').replace(/\s/g,'');if(!title){tst('제목을 입력하세요','error');return}if(!bodyText){tst('내용을 입력하세요','error');return}var btn=document.getElementById('eSubBtn');btn.disabled=true;btn.textContent='저장 중…';
if(ok&&sb&&!String(id).startsWith('d')){
var orig=posts.find(function(x){return x.id===id});var origF=orig?getFiles(orig):[];
if(isAdmin()){
  var removed=origF.filter(function(o){return!editFiles.some(function(e){return e.url===o.url})});
  for(var i=0;i<removed.length;i++){var sp=getStoragePath(removed[i].url)||removed[i].path;if(sp)await sb.storage.from('sop100-board-files').remove([sp])}
  var nf=document.getElementById('eFIn').files;
  for(var j=0;j<nf.length;j++){
    var f=nf[j],ext=f.name.split('.').pop().toLowerCase(),fp='board/'+Date.now()+'_'+Math.random().toString(36).substring(2,8)+'.'+ext;
    btn.textContent='파일 업로드 ('+(j+1)+'/'+nf.length+')…';
    var ur=await sb.storage.from('sop100-board-files').upload(fp,f,{cacheControl:'3600',upsert:false});
    if(ur.error){console.error('Edit upload error:',ur.error);tst('파일 업로드 실패: '+ur.error.message,'error');btn.disabled=false;btn.textContent='저장하기';return}
    var pu=sb.storage.from('sop100-board-files').getPublicUrl(fp);
    editFiles.push({name:f.name,url:pu.data.publicUrl,size:(f.size/1048576).toFixed(1)+'MB',path:fp});
  }
}else{
  editFiles=origF;
}
await sb.from('posts').update({category:cat,title:title,content:body,files:editFiles}).eq('id',id);
btn.disabled=false;btn.textContent='저장하기';closeEdit();closeDet();tst('수정 완료','success');
}else{var p=posts.find(function(x){return x.id===id});if(p){p.category=cat;p.title=title;p.content=body;p.files=editFiles}btn.disabled=false;btn.textContent='저장하기';closeEdit();closeDet();updC();renP();tst('수정 완료','success')}}

// === COMMENTS ===
function loadCmt(id){var el=document.getElementById('cmtList'),cn=document.getElementById('cmtCnt');
if(!ok||!sb||String(id).startsWith('d')){var dc={d1:[{author:'박소방',text:'좋은 플랫폼!',created_at:'2026-03-20T12:00:00'}]};var cm=dc[id]||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:16px;color:#999;font-size:12px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h;return}
sb.from('comments').select('*').eq('post_id',id).order('created_at').then(function(r){var cm=r.data||[];cn.textContent=cm.length;if(!cm.length){el.innerHTML='<div style="text-align:center;padding:16px;color:#999;font-size:12px">댓글 없음</div>';return}var h='';cm.forEach(function(c){h+='<div class="cmt-item"><div class="cmt-author">'+esc(c.author)+'</div><div class="cmt-text">'+esc(c.text)+'</div><div class="cmt-time">'+ago(c.created_at)+'</div></div>'});el.innerHTML=h})}
function addCmt(){if(!me){tst('로그인 필요','error');return}var t=document.getElementById('cmtIn').value.trim();if(!t){tst('댓글 입력','error');return}
if(ok&&sb&&!String(curId).startsWith('d')){sb.from('comments').insert({post_id:curId,author:me.name,text:t}).then(function(r){if(r.error){tst('실패','error');return}
  sb.from('posts').select('comment_count').eq('id',curId).single().then(function(cr){var cur=(cr.data&&cr.data.comment_count)||0;sb.from('posts').update({comment_count:cur+1}).eq('id',curId)});
  document.getElementById('cmtIn').value='';tst('댓글 등록','success');loadCmt(curId)})}else tst('데모 모드','error')}

// === WRITE ===
function openWrite(){
  if(!me){tst('로그인 필요','error');return}
  // eModal이 열려있으면 먼저 닫기
  document.getElementById('eModal').classList.remove('show');
  var fa=document.getElementById('writeFileArea');if(fa)fa.style.display=isAdmin()?'block':'none';
  var wi=document.getElementById('wImgBtnWrap');var wf=document.getElementById('wFileBtnWrap');
  if(wi)wi.style.display=isAdmin()?'flex':'none';
  if(wf)wf.style.display=isAdmin()?'flex':'none';
  document.getElementById('wModal').classList.add('show');
}
function closeWrite(){document.getElementById('wModal').classList.remove('show');document.getElementById('wTitle').value='';var ed=document.getElementById('wEditor');if(ed)ed.innerHTML='';document.getElementById('fPrev').innerHTML='';document.getElementById('fIn').value='';var b=document.getElementById('subBtn');b.disabled=false;b.textContent='게시하기'}


async function submitPost(){var cat=document.getElementById('wCat').value,title=document.getElementById('wTitle').value.trim(),body=(document.getElementById('wEditor').innerHTML||'').trim();if(!title){tst('제목 입력','error');return}var bodyText2=body.replace(/<[^>]+>/g,'').replace(/\s/g,'');if(!bodyText2){tst('내용을 입력하세요','error');return}
var btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='업로드…';
var fi=[];
if(ok&&sb){
  var files=document.getElementById('fIn').files;
  for(var i=0;i<files.length;i++){
    var f=files[i],ext=f.name.split('.').pop().toLowerCase(),fp='board/'+Date.now()+'_'+Math.random().toString(36).substring(2,8)+'.'+ext;
    btn.textContent='파일 업로드 중 ('+(i+1)+'/'+files.length+')…';
    var ur=await sb.storage.from('sop100-board-files').upload(fp,f,{cacheControl:'3600',upsert:false});
    if(ur.error){console.error('Storage upload error:',ur.error);tst('파일 업로드 실패: '+ur.error.message,'error');btn.disabled=false;btn.textContent='게시하기';return}
    var pu=sb.storage.from('sop100-board-files').getPublicUrl(fp);
    fi.push({name:f.name,url:pu.data.publicUrl,size:(f.size/1048576).toFixed(1)+'MB',path:fp});
  }
  btn.textContent='게시글 등록 중…';
  var pd={category:cat,title:title,content:body,author:me.name,author_email:me.email,views:0,likes:0,comment_count:0,pinned:false,files:fi};
  var r=await sb.from('posts').insert(pd);
  if(r.error){console.error('Post insert error:',r.error);tst('실패: '+r.error.message,'error');btn.disabled=false;btn.textContent='게시하기';return}
  closeWrite();tst('등록 완료!'+(fi.length?' (파일 '+fi.length+'개)':''),'success');updC();
}else{var pd={id:'l'+Date.now(),created_at:new Date().toISOString(),category:cat,title:title,content:body,author:me.name,author_email:me.email||'',views:0,likes:0,comment_count:0,pinned:false,files:fi};posts.unshift(pd);updC();renP();closeWrite();tst('등록(로컬)','success')}}

// === RICH EDITOR ===
function fmt(cmd){document.execCommand(cmd,false,null);}
function fmtBlock(tag){document.execCommand('formatBlock',false,'<'+tag+'>');}
function fmtHr(){document.execCommand('insertHTML',false,'<hr style="border:none;border-top:1px solid #e2e8f0;margin:8px 0">');}

async function insertImgFiles(files,editorId){
  if(!ok||!sb){tst('로그인 후 이미지 업로드 가능','error');return;}
  var ed=document.getElementById(editorId);if(!ed)return;
  ed.focus();
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(!f.type.startsWith('image/')){tst('이미지 파일만 가능합니다','error');continue;}
    if(f.size>10*1024*1024){tst('이미지는 10MB 이하만 가능합니다','error');continue;}
    var ext=f.name.split('.').pop().toLowerCase();
    var fp='board-img/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.'+ext;
    var tmpId='img-tmp-'+Date.now();
    document.execCommand('insertHTML',false,'<img id="'+tmpId+'" style="opacity:.4;max-width:100%;border-radius:6px;display:block;margin:4px 0" src="" alt="업로드 중...">');
    var ur=await sb.storage.from('sop100-board-files').upload(fp,f,{cacheControl:'3600',upsert:false});
    var tmp=document.getElementById(tmpId);
    if(ur.error){if(tmp)tmp.remove();tst('이미지 업로드 실패: '+ur.error.message,'error');continue;}
    var pu=sb.storage.from('sop100-board-files').getPublicUrl(fp);
    if(tmp){tmp.src=pu.data.publicUrl;tmp.style.opacity='1';tmp.removeAttribute('id');}
  }
}

document.addEventListener('paste',function(e){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  var active=document.activeElement;
  var editorId=null;
  if(active&&active.id==='wEditor')editorId='wEditor';
  else if(active&&active.id==='eEditor')editorId='eEditor';
  if(!editorId)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')>=0){
      e.preventDefault();
      var file=items[i].getAsFile();
      if(file)insertImgFiles([file],editorId);
      break;
    }
  }
});
</script>
